name: Integration Tests

on:
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

      
    - name: Configure App with Repository Variables
      run: |
        echo "🔧 Configuring app with repository variables..."
        # Check if APP_ID variable exists
        if [[ -n "${{ vars.APP_ID }}" ]]; then
          echo "✅ APP_ID found in repository variables: ${{ vars.APP_ID }}"
          # Update the appId in Embrace_EcommerceApp.swift
          echo "📝 Updating appId in Embrace_EcommerceApp.swift..."
          # Use sed to replace the line containing 'appId: SDKConfiguration.Embrace.appId'
          sed -i '' 's/appId: SDKConfiguration\.Embrace\.appId/appId: "${{ vars.APP_ID }}"/g' "Embrace Ecommerce/Embrace_EcommerceApp.swift"
          echo "✅ Updated appId to use repository variable"
          # Show the updated line for verification
          echo "📋 Updated line:"
          grep -n "appId:" "Embrace Ecommerce/Embrace_EcommerceApp.swift" || echo "⚠️ Could not find appId line"
        else
          echo "❌ ERROR: APP_ID variable not found in repository variables"
          echo "   Please add APP_ID as a repository variable before running this workflow."
          echo "   Go to Settings → Secrets and variables → Actions → Variables tab"
          exit 1
        fi
        echo ""

    - name: Set up Xcode
      run: |
        echo "🔧 Setting up Xcode..."
        # Show available Xcode versions
        echo "📋 Available Xcode installations:"
        ls -la /Applications/Xcode*.app 2>/dev/null || echo "No Xcode*.app found in /Applications"

        # Use xcode-select to ensure we're using the default Xcode
        sudo xcode-select --print-path
        echo "✅ Using Xcode at: $(xcode-select --print-path)"

        # Accept Xcode license if needed
        sudo xcodebuild -license accept 2>/dev/null || echo "License already accepted or not required"
        echo ""

    - name: Environment Information
      run: |
        echo "🔧 ENVIRONMENT INFORMATION"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🖥️  Runner OS: ${{ runner.os }}"
        echo "📅 Date: $(date)"
        echo "🛠️  Xcode Version: $(xcodebuild -version | head -1)"
        echo "📱 Available SDK versions:"
        xcodebuild -showsdks | grep iOS || echo "No iOS SDKs found"
        echo "🔍 Simulator runtimes:"
        xcrun simctl list runtimes | grep iOS || echo "No iOS runtimes found"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""

    - name: Cache derived data and Swift packages
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          ~/Library/Caches/org.swift.swiftpm
        key: ${{ runner.os }}-xcode-cache-${{ hashFiles('**/*.xcodeproj/project.pbxproj', '**/*.swift', '**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-xcode-cache-

    - name: Resolve Swift Package dependencies
      run: |
        echo "📦 Resolving Swift Package dependencies..."
        xcodebuild -resolvePackageDependencies \
          -scheme "Embrace Ecommerce" \
          -derivedDataPath ~/Library/Developer/Xcode/DerivedData || {
          echo "❌ ERROR: Failed to resolve Swift Package dependencies"
          exit 1
        }
        echo "✅ Swift Package dependencies resolved"
        echo ""


    - name: Run UI Tests on multiple devices
      run: |
        echo "🧪 Starting UI Test execution on multiple devices..."
        echo ""

        # Get device info with OS versions
        echo "🔍 Discovering iOS simulator devices with OS versions..."

        # Create temp file with device info
        echo "📱 Getting destination list from xcodebuild..."
        xcodebuild -showdestinations -scheme "Embrace Ecommerce" | \
          grep "platform:iOS Simulator" | \
          grep -E "(iPhone|iPad)" | \
          grep -v "Any iOS Simulator Device" > /tmp/device_destinations.txt || {
          echo "❌ ERROR: Failed to get device destinations"
          exit 1
        }

        echo "📝 Raw device destinations found:"
        cat /tmp/device_destinations.txt | head -5
        echo "... (showing first 5 entries)"
        echo ""

        # Extract device info and create a simple list
        echo "🔄 Processing device information..."
        processed_count=0
        while IFS= read -r line; do
          # Extract device name and OS version more carefully
          device_name=$(echo "$line" | sed -n 's/.*name:\([^,}]*\).*/\1/p' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          os_version=$(echo "$line" | sed -n 's/.*OS:\([^,}]*\).*/\1/p' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          # Validate we have both values and device name is iPhone/iPad
          if [[ -n "$device_name" ]] && [[ -n "$os_version" ]] && [[ "$device_name" =~ ^(iPhone|iPad) ]]; then
            # Clean up any quotes or extra spaces
            device_name=$(echo "$device_name" | sed 's/["'"'"']//g')
            os_version=$(echo "$os_version" | sed 's/["'"'"']//g')

            echo "$device_name|$os_version"
            processed_count=$((processed_count + 1))
          fi
        done < /tmp/device_destinations.txt | sort -u -t'|' -k1,1 > /tmp/device_os_list.txt

        echo "✅ Processed $processed_count device entries"
        echo ""

        # Check if we found any devices
        device_count=$(wc -l < /tmp/device_os_list.txt)
        if [[ $device_count -eq 0 ]]; then
          echo "❌ ERROR: No valid iOS simulator devices found!"
          echo "Debug info:"
          echo "- Raw destinations file size: $(wc -l < /tmp/device_destinations.txt) lines"
          echo "- Processed devices file size: $(wc -l < /tmp/device_os_list.txt) lines"
          exit 1
        fi

        echo "📱 Available devices with OS versions (found $device_count total):"
        cat /tmp/device_os_list.txt | while IFS='|' read -r device os; do
          echo "  ✓ $device (OS: $os)"
        done
        echo ""

        # Test on up to 5 devices
        max_devices=5
        actual_test_count=$(( device_count < max_devices ? device_count : max_devices ))
        echo "🎯 Will test on $actual_test_count devices (max: $max_devices)"
        echo ""

        tested_count=0
        failed_count=0
        passed_count=0

        cat /tmp/device_os_list.txt | head -$max_devices | while IFS='|' read -r device os_version; do
          tested_count=$((tested_count + 1))

          # Validate device and OS are not empty
          if [[ -z "$device" ]] || [[ -z "$os_version" ]]; then
            echo "❌ ERROR: Empty device name or OS version - skipping"
            echo "  Device: '$device'"
            echo "  OS Version: '$os_version'"
            failed_count=$((failed_count + 1))
            continue
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 TEST $tested_count/$actual_test_count: $device (OS: $os_version)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📱 Device: $device"
          echo "📊 OS Version: $os_version"
          echo "🎯 Target: Embrace EcommerceUITests"
          echo ""

          destination="platform=iOS Simulator,name=$device,OS=$os_version"
          echo "🚀 Executing: xcodebuild test with destination: $destination"

          if xcodebuild test \
            -scheme "Embrace Ecommerce" \
            -destination "$destination" \
            -only-testing:"Embrace EcommerceUITests/Embrace_EcommerceUITests/testAuthenticationGuestFlow" \
            -allowProvisioningUpdates \
            -skipMacroValidation; then
            echo "✅ PASSED: Tests completed successfully on $device"
            passed_count=$((passed_count + 1))
          else
            echo "❌ FAILED: Tests failed on $device (OS: $os_version)"
            failed_count=$((failed_count + 1))
            echo "📝 Note: Continuing with remaining devices..."
          fi
          echo ""
        done

        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📊 FINAL RESULTS"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔢 Total devices found: $device_count"
        echo "🧪 Devices tested: $actual_test_count"
        echo "✅ Passed: $passed_count"
        echo "❌ Failed: $failed_count"
        echo ""

        if [[ $passed_count -gt 0 ]]; then
          echo "🎉 SUCCESS: At least one device passed tests"
        else
          echo "💥 FAILURE: No devices passed tests"
          exit 1
        fi
